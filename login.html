<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masuk | Monitoring IoT</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-brand">
      <img src="img/logo.png" alt="Logo" />
      <h1>Selamat Datang Kembali</h1>
      <p>Masuk untuk mengakses dashboard monitoring Anda</p>
    </div>
    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nama@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div style="position: relative; display: flex; align-items: center;">
          <input type="password" id="password" placeholder="••••••••" required
            style="width: 100%; padding-right: 2.75rem; box-sizing: border-box;" />
          <button type="button" id="togglePassword" aria-label="Tampilkan password"
            style="position: absolute; right: 0.75rem; background: none; border: none;
                   cursor: pointer; color: #9ca3af; padding: 0; display: flex;
                   align-items: center;">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
              viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-row">
        <label class="checkbox">
          <input type="checkbox" /> Ingat saya
        </label>
        <a href="#" class="link">Lupa password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Masuk</button>
      <p id="loginMessage" class="form-message"></p>
      <p class="form-footer">Belum punya akun? <a href="#" class="link">Daftar di sini</a></p>
    </form>
  </div>
  <div class="login-art">
    <div class="art-content">
      <h2>Monitoring <br/>Lebih Cerdas</h2>
      <p>Pantau seluruh sensor IoT Anda dalam satu dashboard yang elegan dan modern.</p>
    </div>
  </div>
</div>

<script>
  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  const eyeOpen = `
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>`;

  const eyeClosed = `
    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
    <line x1="1" y1="1" x2="23" y2="23"/>`;

  togglePassword.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    eyeIcon.innerHTML = isHidden ? eyeClosed : eyeOpen;
    togglePassword.setAttribute('aria-label', isHidden ? 'Sembunyikan password' : 'Tampilkan password');
  });
</script>

<script type="module" src="js/auth.js"></script>
</body>
</html>
